name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: |
          cd brandflow
          rm -f pnpm-lock.yaml
          pnpm install

      - name: Type check
        run: cd brandflow && pnpm run typecheck || true

      - name: Lint
        run: cd brandflow && pnpm run lint || true